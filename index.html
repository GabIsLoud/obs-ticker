<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBS Side-Scrolling Ticker</title>
  <style>
    :root {
      --bg: rgba(0,0,0,0.6);
      --fg: #ffffff;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      --size: 48;
      --speed: 160;
      --paddingY: 6;
      --paddingX: 16;
      --gapX: 12;
      --collapseMs: 0;
      --fadeMs: 320;
      --logoUrl: "logo.png";
      --messagesUrl: "messages.txt";
      --shadow: 0 1px 2px rgba(0,0,0,0.35);
    }

    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    #tickerRoot {
      position: relative;
      width: 100vw;
      font-family: var(--font);
      font-size: calc(var(--size) * 1px);
      line-height: 1.25;
      color: var(--fg);
      display: flex;
      align-items: center;
      box-sizing: border-box;
      padding: calc(var(--paddingY) * 1px) calc(var(--paddingX) * 1px);
      backdrop-filter: blur(2px);
      background: var(--bg);
      text-shadow: var(--shadow);
      opacity: 1;
      transform: translateY(0);
      transition:
        opacity calc(var(--fadeMs) * 1ms) ease,
        transform calc(var(--fadeMs) * 1ms) ease;
      overflow: hidden;
    }

    #tickerRoot.isHidden {
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
    }

    #track,
    #presetPicker {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      height: 1.25em;
      overflow: hidden;
    }

    #track[hidden],
    #presetPicker[hidden] {
      display: none !important;
    }

    .slide {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      will-change: transform;
      display: flex;
      align-items: center;
      gap: calc(var(--gapX) * 1px);
    }

    .logo {
      height: 1em;
      width: auto;
      aspect-ratio: auto;
      display: inline-block;
      vertical-align: middle;
      image-rendering: auto;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.35));
      margin-inline: 0.35em;
    }

    .msg {
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    #presetPicker {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      gap: 0.4em;
    }

    .presetBtn {
      flex: 1 1 0;
      min-width: 0;
      height: 100%;
      border: 0;
      border-radius: 0.35em;
      background: rgba(255,255,255,0.12);
      color: var(--fg);
      font: inherit;
      font-size: 0.52em;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0 0.7em;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease, opacity 120ms ease;
      text-shadow: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .presetBtn:hover,
    .presetBtn:focus-visible {
      background: rgba(255,255,255,0.2);
      outline: none;
    }

    .presetBtn:active {
      transform: translateY(1px);
    }

    #tickerRoot.rules::before,
    #tickerRoot.rules::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0.5;
      background: linear-gradient(90deg, transparent, var(--fg), transparent);
    }

    #tickerRoot.rules::before { top: 0; }
    #tickerRoot.rules::after  { bottom: 0; }
  </style>
</head>
<body>
  <div id="tickerRoot" aria-live="polite" aria-atomic="true">
    <div id="presetPicker" hidden></div>
    <div id="track"></div>
  </div>

  <script>
    (function () {
      const qp = new URLSearchParams(location.search);
      const root = document.getElementById('tickerRoot');
      const track = document.getElementById('track');
      const presetPicker = document.getElementById('presetPicker');

      const MANIFEST_URL = qp.get('manifest') || 'games.json';

      let PRESETS = {};
      let PRESET_ORDER = [];
      let VISIBLE_PRESET_ORDER = [];

      let allMessages = [];
      let messagePool = [];
      let lastMessage = '';

      let raf = null;
      let animating = false;
      let currentCfg = null;
      let loopStarted = false;
      let selectedPresetKey = normalizePresetKey(qp.get('preset'));

      bootstrap();

      async function bootstrap() {
        try {
          const manifest = await fetch(MANIFEST_URL, { cache: 'no-store' }).then(r => {
            if (!r.ok) throw new Error(`Manifest load failed: ${r.status}`);
            return r.json();
          });

          PRESETS = {};
          PRESET_ORDER = [];
          VISIBLE_PRESET_ORDER = [];

          const games = Array.isArray(manifest.games) ? manifest.games : [];
          for (const item of games) {
            if (!item || !item.key || !item.label || !item.src) continue;
            const key = normalizePresetKey(item.key);
            PRESETS[key] = item;
            PRESET_ORDER.push(key);
            if (isPresetVisible(item.visible)) {
              VISIBLE_PRESET_ORDER.push(key);
            }
          }

          const presetFromQuery = PRESETS[selectedPresetKey] || null;
          const usingDirectSrc = !!qp.get('src');

          if (!presetFromQuery && !usingDirectSrc) {
            renderPresetPicker();
            return;
          }

          initTicker(buildConfig(presetFromQuery));
        } catch (err) {
          console.error('Failed to load games manifest:', err);
          PRESETS = {};
          PRESET_ORDER = [];
          VISIBLE_PRESET_ORDER = [];
          renderPresetPicker();
        }
      }

      function renderPresetPicker() {
        track.hidden = true;
        presetPicker.hidden = false;
        presetPicker.innerHTML = '';
        applyPickerChrome();

        if (!VISIBLE_PRESET_ORDER.length) {
          root.classList.add('isHidden');
          root.setAttribute('aria-hidden', 'true');
          return;
        }

        root.classList.remove('isHidden');
        root.setAttribute('aria-hidden', 'false');

        VISIBLE_PRESET_ORDER.forEach((key) => {
          const preset = PRESETS[key];
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'presetBtn';
          btn.textContent = preset.label;
          btn.title = preset.label;
          btn.addEventListener('click', () => choosePreset(key));
          presetPicker.appendChild(btn);
        });
      }

      function choosePreset(key) {
        const preset = PRESETS[key];
        if (!preset) return;

        selectedPresetKey = key;
        presetPicker.hidden = true;
        track.hidden = false;
        initTicker(buildConfig(preset), { resetAnimationState: true });
      }

      function applyPickerChrome() {
        root.classList.remove('rules', 'isHidden');
        root.setAttribute('aria-hidden', 'false');
        setCssVar('--bg', 'rgba(0,0,0,0.75)');
        setCssVar('--fg', '#ffffff');
        setCssVar('--font', 'system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif');
        setCssVar('--size', clampNum(qp.get('size'), 12, 200, 30));
        setCssVar('--paddingY', clampNum(qp.get('py'), 0, 100, 6));
        setCssVar('--paddingX', clampNum(qp.get('px'), 0, 200, 16));
        setCssVar('--gapX', clampNum(qp.get('gap'), 0, 200, 14));
      }

      function initTicker(cfg, opts = {}) {
        if (opts.resetAnimationState) {
          if (raf) cancelAnimationFrame(raf);
          raf = null;
          animating = false;
          loopStarted = false;
          allMessages = [];
          messagePool = [];
          lastMessage = '';
          track.innerHTML = '';
        }

        currentCfg = cfg;

        setCssVar('--bg', cfg.bg);
        setCssVar('--fg', cfg.fg);
        setCssVar('--font', cfg.font);
        setCssVar('--size', cfg.size);
        setCssVar('--speed', cfg.speed);
        setCssVar('--paddingY', cfg.paddingY);
        setCssVar('--paddingX', cfg.paddingX);
        setCssVar('--gapX', cfg.gapX);
        setCssVar('--fadeMs', cfg.fadeMs);

        root.classList.toggle('rules', !!cfg.rules);

        if (cfg.fontUrl) ensureFontLoaded(cfg.fontUrl);

        fetchMessages(cfg.messagesUrl)
          .then(loaded => {
            allMessages = normalizeMessages(loaded);

            if (!allMessages.length) {
              allMessages = [
                'Welcome to the stream!',
                "Don’t forget to subscribe!",
                'Check out gabisness.com'
              ];
            }

            refillMessagePool();

            if (!loopStarted) {
              loopStarted = true;
              nextSlide();
            }
          })
          .catch(err => {
            console.error('Failed to load messages:', err);
            allMessages = ['(ticker) Unable to load messages file.'];
            refillMessagePool();

            if (!loopStarted) {
              loopStarted = true;
              nextSlide();
            }
          });
      }

      function buildConfig(preset) {
        const merged = {
          ...(preset || {}),
          ...(qp.get('bg') ? { bg: qp.get('bg') } : {}),
          ...(qp.get('fg') ? { fg: qp.get('fg') } : {}),
          ...(qp.get('font') ? { font: qp.get('font') } : {}),
          ...(qp.get('fontUrl') ? { fontUrl: qp.get('fontUrl') } : {}),
          ...(qp.get('logo') ? { logo: qp.get('logo') } : {}),
          ...(qp.get('src') ? { src: qp.get('src') } : {}),
          ...(qp.get('rules') ? { rules: qp.get('rules') } : {}),
          ...(qp.get('direction') ? { direction: qp.get('direction') } : {})
        };

        return {
          bg: merged.bg ?? getComputedStyle(document.documentElement).getPropertyValue('--bg').trim(),
          fg: merged.fg ?? getComputedStyle(document.documentElement).getPropertyValue('--fg').trim(),
          font: merged.font ?? getComputedStyle(document.documentElement).getPropertyValue('--font').trim(),
          size: clampNum(qp.get('size') ?? merged.size, 12, 200, +getCssVar('--size')),
          speed: clampNum(qp.get('speed') ?? merged.speed, 20, 2000, +getCssVar('--speed')),
          paddingY: clampNum(qp.get('py'), 0, 100, +getCssVar('--paddingY')),
          paddingX: clampNum(qp.get('px'), 0, 200, +getCssVar('--paddingX')),
          gapX: clampNum(qp.get('gap') ?? merged.gap, 0, 200, +getCssVar('--gapX')),
          collapseMs: clampNum(qp.get('collapse') ?? merged.collapse, 0, 3600000, +getCssVar('--collapseMs')),
          fadeMs: clampNum(qp.get('fadeMs') ?? merged.fadeMs, 0, 60000, +getCssVar('--fadeMs')),
          logoUrl: merged.logo || getCssVar('--logoUrl').replace(/"/g, '').trim(),
          messagesUrl: merged.src || getCssVar('--messagesUrl').replace(/"/g, '').trim(),
          fontUrl: merged.fontUrl || '',
          rules: String(merged.rules ?? '') === '1',
          direction: (String(merged.direction ?? '').toLowerCase() === 'rtl') ? 'rtl' : 'ltr'
        };
      }

      function fetchMessages(messagesUrl) {
        return fetch(messagesUrl, { cache: 'no-store' })
          .then(r => {
            if (!r.ok) throw new Error(`Messages load failed: ${r.status}`);
            return r.text().then(txt => ({
              txt,
              isJson: messagesUrl.toLowerCase().endsWith('.json')
            }));
          })
          .then(({ txt, isJson }) => {
            if (isJson) {
              const arr = JSON.parse(txt);
              return (Array.isArray(arr) ? arr : []).map(s => String(s)).filter(Boolean);
            }
            return txt.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
          });
      }

      function normalizeMessages(arr) {
        const seen = new Set();
        const out = [];

        for (const raw of arr) {
          const s = String(raw || '').trim();
          if (!s) continue;

          const key = s.toLowerCase();
          if (seen.has(key)) continue;

          seen.add(key);
          out.push(s);
        }

        return out;
      }

      function shuffleArray(arr) {
        const copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function refillMessagePool() {
        if (!allMessages.length) {
          messagePool = [];
          return;
        }

        let nextPool = shuffleArray(allMessages);

        if (lastMessage && nextPool.length > 1 && nextPool[0] === lastMessage) {
          const swapIndex = nextPool.findIndex(msg => msg !== lastMessage);
          if (swapIndex > 0) {
            [nextPool[0], nextPool[swapIndex]] = [nextPool[swapIndex], nextPool[0]];
          }
        }

        messagePool = nextPool;
      }

      function getNextMessage() {
        if (!messagePool.length) {
          refillMessagePool();
        }

        const msg = messagePool.shift() || '';
        lastMessage = msg;
        return msg;
      }

      function nextSlide() {
        if (animating || !currentCfg) return;

        const msg = getNextMessage();
        if (!msg) return;

        runOnce(msg).then(() => {
          requestAnimationFrame(() => {
            if (currentCfg.collapseMs > 0) {
              root.classList.add('isHidden');
              root.setAttribute('aria-hidden', 'true');
              setTimeout(() => {
                root.classList.remove('isHidden');
                root.setAttribute('aria-hidden', 'false');
                nextSlide();
              }, currentCfg.collapseMs);
            } else {
              nextSlide();
            }
          });
        });
      }

      function runOnce(text) {
        return new Promise(resolve => {
          track.innerHTML = '';

          const slide = document.createElement('div');
          slide.className = 'slide';

          const imgL = document.createElement('img');
          imgL.className = 'logo';
          imgL.alt = '';
          imgL.decoding = 'async';
          imgL.src = currentCfg.logoUrl;

          const span = document.createElement('span');
          span.className = 'msg';
          span.textContent = text;

          const imgR = document.createElement('img');
          imgR.className = 'logo';
          imgR.alt = '';
          imgR.decoding = 'async';
          imgR.src = currentCfg.logoUrl;

          if (currentCfg.direction === 'rtl') {
            slide.appendChild(imgR.cloneNode());
            slide.appendChild(span);
            slide.appendChild(imgL.cloneNode());
          } else {
            slide.appendChild(imgL);
            slide.appendChild(span);
            slide.appendChild(imgR);
          }

          track.appendChild(slide);

          requestAnimationFrame(() => {
            const trackRect = track.getBoundingClientRect();
            const slideRect = slide.getBoundingClientRect();
            const contentWidth = slideRect.width;
            const startX = trackRect.width;
            const offscreenPadding = 4;
            const endX = -(contentWidth + offscreenPadding);
            const totalDistance = startX - endX;
            const durationMs = (totalDistance / currentCfg.speed) * 1000;

            let start = null;
            animating = true;

            function step(ts) {
              if (!start) start = ts;
              const elapsed = ts - start;
              const progress = Math.min(elapsed / durationMs, 1);
              const x = lerp(startX, endX, progress);
              slide.style.transform = `translate(${x}px, -50%)`;

              if (progress < 1) {
                raf = requestAnimationFrame(step);
              } else {
                animating = false;
                resolve();
              }
            }

            slide.style.transform = `translate(${startX}px, -50%)`;
            raf = requestAnimationFrame(step);
          });
        });
      }

      function ensureFontLoaded(url) {
        if ([...document.querySelectorAll('link[data-ticker-font]')].some(link => link.href === url)) return;
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.dataset.tickerFont = '1';
        document.head.appendChild(link);
      }

      function normalizePresetKey(value) {
        return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
      }

      function isPresetVisible(value) {
        if (typeof value === 'boolean') return value;
        if (typeof value === 'number') return value !== 0;
        const normalized = String(value ?? '').trim().toLowerCase();
        if (!normalized) return true;
        if (['0', 'false', 'no', 'off'].includes(normalized)) return false;
        return true;
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function clampNum(v, min, max, fallback) {
        const n = Number(v);
        if (!isFinite(n)) return fallback;
        return Math.max(min, Math.min(max, n));
      }

      function getCssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name);
      }

      function setCssVar(name, value) {
        document.documentElement.style.setProperty(name, value);
      }

      addEventListener('resize', () => {});

      const reloadEvery = clampNum(qp.get('reloadEvery'), 0, 1000, 0);
      if (reloadEvery > 0) {
        let shown = 0;
        const origNext = nextSlide;
        nextSlide = function patchedNext() {
          shown++;
          if (shown % reloadEvery === 0 && currentCfg) {
            fetchMessages(currentCfg.messagesUrl)
              .then(loaded => {
                allMessages = normalizeMessages(loaded);
                refillMessagePool();
              })
              .catch(() => {});
          }
          origNext();
        };
      }

      window.OBSTicker = {
        get presets() {
          return Object.fromEntries(
            PRESET_ORDER.map(k => [k, PRESETS[k].label])
          );
        },
        choosePreset,
        setMessages(arr) {
          if (Array.isArray(arr) && arr.length) {
            allMessages = normalizeMessages(arr.map(String));
            messagePool = [];
            lastMessage = '';
            refillMessagePool();
          }
        },
        next() {
          if (!animating) nextSlide();
        },
        showPicker() {
          if (raf) cancelAnimationFrame(raf);
          raf = null;
          animating = false;
          loopStarted = false;
          allMessages = [];
          messagePool = [];
          lastMessage = '';
          track.innerHTML = '';
          track.hidden = true;
          presetPicker.hidden = false;
          renderPresetPicker();
        }
      };
    })();
  </script>
</body>
</html>
